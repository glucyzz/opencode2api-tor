name: Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: linux
            goarch: arm
            goarm: "7"
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          EXT: ${{ matrix.ext }}
        run: |
          mkdir -p dist
          suffix="${GOARCH}"
          if [ -n "${GOARM}" ]; then suffix="${suffix}v${GOARM}"; fi
          go build -trimpath -ldflags="-s -w" -o "dist/opencode2api-${GOOS}-${suffix}${EXT}" ./opencode2api.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode2api-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm || '' }}
          path: dist/*
