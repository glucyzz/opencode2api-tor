name: Build

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: linux
            goarch: arm
            goarm: "7"
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          EXT: ${{ matrix.ext }}
        run: |
          mkdir -p dist
          suffix="${GOARCH}"
          if [ -n "${GOARM}" ]; then suffix="${suffix}v${GOARM}"; fi
          name="opencode2api-${GOOS}-${suffix}${EXT}"
          go build -trimpath -ldflags="-s -w" -o "dist/${name}" ./opencode2api.go
          cd dist
          if [ "${GOOS}" = "windows" ]; then
            zip "${name}.zip" "${name}"
          else
            tar -czf "${name}.tar.gz" "${name}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode2api-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm || '' }}
          path: |
            dist/*.zip
            dist/*.tar.gz

  release:
    name: Tagged Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  latest:
    name: Latest Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          git tag -f latest "${GITHUB_SHA}"
          git push -f origin latest
          gh release create latest release/* \
            --title "Latest build" \
            --notes "Automatic build from ${GITHUB_SHA}." \
            --latest
